version: '3.9'

services:
  #Servicio de la API FastAPI
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: pdf-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_NAME=PDF Extractor API
      - APP_VERSION=1.0.0
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=pdf_extractor
      - LOG_LEVEL=INFO
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - pdf-network
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  #Servicio de Mongo DB
  mongodb:
    image: mongo:latest
    container_name: pdf_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=pdf_extractor
    volumes:
      - mongodb_data:/data/db
    networks:
      - pdf-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/pdf_extractor --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongodb_data:
    driver: local

networks:
  pdf-network:
    driver: bridge